name: Responsive Validator

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run daily at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to test'
        required: true
        default: 'https://example.com'

jobs:
  responsive-test:
    name: Test ${{ matrix.browser }} (${{ matrix.shard }}/${{ matrix.total-shards }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        browser: [webkit, chromium, firefox]
        shard: [1, 2, 3, 4]
        total-shards: [4]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run responsive tests
        env:
          TEST_URL: ${{ secrets.TEST_URL || github.event.inputs.url || 'https://example.com' }}
        run: |
          node run.js $TEST_URL \
            --browsers ${{ matrix.browser }} \
            --ci \
            --headless \
            --timeout 30000

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: ~/.ws-workspace/reports/responsive-validator/
          retention-days: 30

      - name: Upload screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.browser }}-shard-${{ matrix.shard }}
          path: ~/.ws-workspace/reports/responsive-validator/screenshots/
          retention-days: 7

  merge-reports:
    name: Merge Test Reports
    runs-on: ubuntu-latest
    needs: responsive-test
    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: reports/

      - name: Merge reports
        run: |
          echo "All test reports downloaded"
          ls -R reports/

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: merged-report
          path: reports/
          retention-days: 30

  comment-pr:
    name: Comment on PR
    runs-on: ubuntu-latest
    needs: responsive-test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Comment test results
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment => {
              return comment.user.type === 'Bot' && comment.body.includes('Responsive Validator Results');
            });

            const output = `## 🚀 Responsive Validator Results

            ✅ Tests completed successfully!

            📊 **Summary:**
            - Browsers tested: WebKit, Chromium, Firefox
            - Breakpoints: 16 standard resolutions
            - Checks: Visual, Layout, Accessibility, Performance

            📎 [View detailed report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: output
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: output
              });
            }
